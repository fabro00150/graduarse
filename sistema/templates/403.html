{% load static %}
<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>403 - Acceso denegado | JAAP</title>
    <link rel="shortcut icon" type="image/png" href="{% static 'assets/images/logos/favicon.png' %}" />
    <link rel="stylesheet" href="{% static 'assets/css/styles.min.css' %}" />
    <style>
        body {
            background: linear-gradient(135deg, #9ABAFF 0%, #CFF3FE 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .error-container {
            text-align: center;
            padding: 50px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 90%;
        }
        .error-code {
            font-size: 120px;
            font-weight: 700;
            color: #9AA9FF;
            line-height: 1;
            margin-bottom: 10px;
        }
        .error-title {
            font-size: 28px;
            color: #333;
            margin-bottom: 15px;
        }
        .error-message {
            font-size: 16px;
            color: #666;
            margin-bottom: 30px;
        }
        .btn-home {
            background: linear-gradient(135deg, #9AA4FF 0%, #CFF8FE 100%);
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-home:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(154, 201, 255, 0.4);
            color: white;
        }
        .btn-back {
            background: transparent;
            color: #666;
            padding: 12px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            border: 2px solid #ddd;
            margin-left: 10px;
            transition: all 0.3s ease;
        }
        .btn-back:hover {
            border-color: #000000;
            color: #050505;
        }
    </style>
</head>
<body>
    <div class="error-container">
        
        <div class="error-code">403</div>
        <h1 class="error-title">Acceso denegado</h1>
        <p class="error-message">
            No tienes permisos para acceder a esta página.<br>
            Por favor, contacta con el administrador si crees que esto es un error.
        </p>
        <div>
            <a href="javascript:history.back()" class="btn-back">Volver</a>
            <a href="{% url 'index' %}" class="btn-home">Ir al Inicio</a>
        </div>
    </div>
</body>
</html>
